{% set versions = {
    "0.2.1": "dbdac15f808c5bc8df20909b1892071ee31a2720ef6c6d3969eaf20f635c6b2f"
} %}

{% set version = environ.get('COMMIT_VERSION', None) %}
{% set version = version or versions.keys()|first %}
{% set version = version|string %}
{% set root_tag = (root or '')|replace('.', '') %}

{% set name = environ.get('ANACONDA_PACKAGE', 'afterburner')|string|lower %}

package:
  name: {{ name }}
  version: {{ environ.get('ANACONDA_VERSION', version)|replace("-", ".") }}

source:
  url: "https://github.com/eic/afterburner/archive/refs/tags/v{{ version }}.tar.gz"
  {% if versions.get(version, None) %}
  sha256: {{ versions.get(version) }}
  {% endif %}

build:
  number: 0
  string: "root{{ root_tag }}"
  # CLI tool (abconv), not a library -- nothing links against it, so no run_exports.
  # No ROOT dictionary generation currently, but this links against ROOT
  # and could grow one -- pre-emptive protection against conda-build's
  # prefix-relocation corrupting a future lib/*.pcm, matching
  # root-feedstock/root-plus-feedstock's fix for the identical artifact.
  ignore_prefix_files:
    - lib/*.pcm

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}
    - root {{ root }}.*
    - cmake
    - make
  host:
    - root {{ root }}.*
    - hepmc>=3.2.6 root{{ root_tag }}
    - clhep
    - yaml-cpp
    - gsl
    - zlib
  run:
    - root {{ root }}.*
    - hepmc>=3.2.6 root{{ root_tag }}
    - clhep
    - yaml-cpp
    - gsl
    - zlib

test:
  commands:
    - test -x "${PREFIX}/bin/abconv"

about:
  home: "https://github.com/eic/afterburner"
  license: "NOASSERTION"
  summary: "Monte Carlo afterburner for beam crossing-angle and beam effects"
  description: |
    The EIC afterburner applies beam crossing-angle and beam-effects
    corrections to HepMC event samples. The CMake project lives under
    cpp/ in the upstream repo; abconv is the HepMC format-conversion +
    afterburner-application CLI built here (Pythia-specific pieces of
    the wider monorepo are not part of this build).

extra:
  recipe-maintainers:
    - meiyasan
